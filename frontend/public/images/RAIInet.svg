<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid background -->
  <g stroke="#1e2235" stroke-width="1" opacity="0.6">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="0" y1="224" x2="800" y2="224"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="336" x2="800" y2="336"/>
    <line x1="0" y1="392" x2="800" y2="392"/>
    <line x1="80" y1="0" x2="80" y2="450"/>
    <line x1="160" y1="0" x2="160" y2="450"/>
    <line x1="240" y1="0" x2="240" y2="450"/>
    <line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/>
    <line x1="560" y1="0" x2="560" y2="450"/>
    <line x1="640" y1="0" x2="640" y2="450"/>
    <line x1="720" y1="0" x2="720" y2="450"/>
  </g>

  <!-- Game board (8x8 Stratego-like grid) -->
  <g transform="translate(60, 80)">
    <!-- Board border glow -->
    <rect x="-3" y="-3" width="326" height="326" rx="6" fill="none" stroke="#00b4d8" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
    <!-- Board cells -->
    <rect width="320" height="320" rx="4" fill="#141724"/>
    <!-- Grid lines -->
    <g stroke="#1e2a3a" stroke-width="0.8">
      <line x1="40" y1="0" x2="40" y2="320"/>
      <line x1="80" y1="0" x2="80" y2="320"/>
      <line x1="120" y1="0" x2="120" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="320"/>
      <line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="280" y1="0" x2="280" y2="320"/>
      <line x1="0" y1="40" x2="320" y2="40"/>
      <line x1="0" y1="80" x2="320" y2="80"/>
      <line x1="0" y1="120" x2="320" y2="120"/>
      <line x1="0" y1="160" x2="320" y2="160"/>
      <line x1="0" y1="200" x2="320" y2="200"/>
      <line x1="0" y1="240" x2="320" y2="240"/>
      <line x1="0" y1="280" x2="320" y2="280"/>
    </g>

    <!-- Blue player pieces (top) -->
    <g fill="#0077b6" opacity="0.85">
      <rect x="5" y="5" width="30" height="30" rx="4"/>
      <rect x="45" y="5" width="30" height="30" rx="4"/>
      <rect x="85" y="5" width="30" height="30" rx="4"/>
      <rect x="125" y="5" width="30" height="30" rx="4"/>
      <rect x="165" y="5" width="30" height="30" rx="4"/>
      <rect x="205" y="5" width="30" height="30" rx="4"/>
      <rect x="245" y="5" width="30" height="30" rx="4"/>
      <rect x="285" y="5" width="30" height="30" rx="4"/>
      <rect x="5" y="45" width="30" height="30" rx="4"/>
      <rect x="45" y="45" width="30" height="30" rx="4"/>
      <rect x="85" y="45" width="30" height="30" rx="4"/>
      <rect x="125" y="45" width="30" height="30" rx="4"/>
      <rect x="165" y="45" width="30" height="30" rx="4"/>
      <rect x="285" y="45" width="30" height="30" rx="4"/>
    </g>

    <!-- Red player pieces (bottom) -->
    <g fill="#9b2335" opacity="0.85">
      <rect x="5" y="245" width="30" height="30" rx="4"/>
      <rect x="45" y="245" width="30" height="30" rx="4"/>
      <rect x="125" y="245" width="30" height="30" rx="4"/>
      <rect x="165" y="245" width="30" height="30" rx="4"/>
      <rect x="205" y="245" width="30" height="30" rx="4"/>
      <rect x="245" y="245" width="30" height="30" rx="4"/>
      <rect x="285" y="245" width="30" height="30" rx="4"/>
      <rect x="5" y="285" width="30" height="30" rx="4"/>
      <rect x="45" y="285" width="30" height="30" rx="4"/>
      <rect x="85" y="285" width="30" height="30" rx="4"/>
      <rect x="125" y="285" width="30" height="30" rx="4"/>
      <rect x="165" y="285" width="30" height="30" rx="4"/>
      <rect x="205" y="285" width="30" height="30" rx="4"/>
      <rect x="285" y="285" width="30" height="30" rx="4"/>
    </g>

    <!-- Water tiles (blocked squares) -->
    <g fill="#0d1b2a" stroke="#1a3a5c" stroke-width="1">
      <rect x="125" y="125" width="30" height="30" rx="3"/>
      <rect x="165" y="125" width="30" height="30" rx="3"/>
      <rect x="125" y="165" width="30" height="30" rx="3"/>
      <rect x="165" y="165" width="30" height="30" rx="3"/>
    </g>

    <!-- Piece labels -->
    <g font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" fill="#e0f4ff">
      <text x="20" y="26">M</text>
      <text x="60" y="26">3</text>
      <text x="100" y="26">5</text>
      <text x="140" y="26">B</text>
      <text x="180" y="26">8</text>
      <text x="220" y="26">9</text>
      <text x="260" y="26">4</text>
      <text x="300" y="26">F</text>
    </g>
    <g font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffd6d6">
      <text x="20" y="266">F</text>
      <text x="60" y="266">8</text>
      <text x="140" y="266">3</text>
      <text x="180" y="266">5</text>
      <text x="220" y="266">B</text>
      <text x="260" y="266">9</text>
      <text x="300" y="266">M</text>
      <text x="20" y="306">4</text>
      <text x="60" y="306">2</text>
      <text x="100" y="306">7</text>
      <text x="140" y="306">6</text>
      <text x="180" y="306">1</text>
      <text x="220" y="306">B</text>
      <text x="300" y="306">S</text>
    </g>
  </g>

  <!-- Right side content -->
  <g transform="translate(440, 80)">
    <!-- Title -->
    <text font-family="'Courier New', monospace" font-size="38" font-weight="bold" fill="#ffffff" filter="url(#glow)">RAIInet</text>
    <!-- Cyan underline -->
    <rect y="48" width="220" height="2" fill="url(#accentGrad)" rx="1"/>

    <!-- Tag line -->
    <text y="80" font-family="'Courier New', monospace" font-size="13" fill="#8899bb">C++ Strategy Game</text>

    <!-- Feature badges -->
    <g transform="translate(0, 110)">
      <!-- Badge 1 -->
      <rect width="140" height="26" rx="13" fill="#0a2540" stroke="#00b4d8" stroke-width="1"/>
      <text x="70" y="17" font-family="monospace" font-size="11" fill="#00b4d8" text-anchor="middle">MVC Architecture</text>

      <!-- Badge 2 -->
      <rect y="38" width="148" height="26" rx="13" fill="#0a2540" stroke="#00b4d8" stroke-width="1"/>
      <text x="74" y="55" font-family="monospace" font-size="11" fill="#00b4d8" text-anchor="middle">Observer Pattern</text>

      <!-- Badge 3 -->
      <rect y="76" width="156" height="26" rx="13" fill="#0a2540" stroke="#00b4d8" stroke-width="1"/>
      <text x="78" y="93" font-family="monospace" font-size="11" fill="#00b4d8" text-anchor="middle">Factory Method</text>

      <!-- Badge 4 -->
      <rect y="114" width="172" height="26" rx="13" fill="#0a2540" stroke="#00b4d8" stroke-width="1"/>
      <text x="86" y="131" font-family="monospace" font-size="11" fill="#00b4d8" text-anchor="middle">Smart Pointers / RAII</text>

      <!-- Badge 5 -->
      <rect y="152" width="120" height="26" rx="13" fill="#0a2540" stroke="#00b4d8" stroke-width="1"/>
      <text x="60" y="169" font-family="monospace" font-size="11" fill="#00b4d8" text-anchor="middle">Pimpl Idiom</text>
    </g>

    <!-- Code snippet -->
    <g transform="translate(0, 320)">
      <rect width="320" height="70" rx="6" fill="#0d1117" stroke="#2a3a4a" stroke-width="1"/>
      <text x="12" y="20" font-family="'Courier New', monospace" font-size="11" fill="#6e7f8d">// 0% memory leaks via RAII</text>
      <text x="12" y="36" font-family="'Courier New', monospace" font-size="11">
        <tspan fill="#c792ea">auto</tspan>
        <tspan fill="#e0e0e0"> piece = </tspan>
        <tspan fill="#82aaff">make_unique</tspan>
        <tspan fill="#e0e0e0">&lt;Piece&gt;();</tspan>
      </text>
      <text x="12" y="52" font-family="'Courier New', monospace" font-size="11">
        <tspan fill="#c792ea">unique_ptr</tspan>
        <tspan fill="#e0e0e0">&lt;View&gt; view;</tspan>
      </text>
      <text x="12" y="68" font-family="'Courier New', monospace" font-size="11" fill="#6e7f8d">// 20+ decoupled classes</text>
    </g>

    <!-- Tech stack -->
    <g transform="translate(0, 406)">
      <rect width="50" height="20" rx="4" fill="#1e2a1e" stroke="#4caf50" stroke-width="0.8"/>
      <text x="25" y="14" font-family="monospace" font-size="10" fill="#4caf50" text-anchor="middle">C++</text>
      <rect x="58" width="40" height="20" rx="4" fill="#1e2a1e" stroke="#4caf50" stroke-width="0.8"/>
      <text x="78" y="14" font-family="monospace" font-size="10" fill="#4caf50" text-anchor="middle">OOP</text>
      <rect x="106" width="54" height="20" rx="4" fill="#1e2a1e" stroke="#4caf50" stroke-width="0.8"/>
      <text x="133" y="14" font-family="monospace" font-size="10" fill="#4caf50" text-anchor="middle">Linux</text>
    </g>
  </g>
</svg>
