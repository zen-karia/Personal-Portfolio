  <!-- Title block -->
  <text x="40" y="58" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="42" font-weight="800" fill="#ffffff" filter="url(#glow)">Triage</text>
  <rect x="40" y="66" width="200" height="2.5" rx="1.5" fill="url(#orangeGrad)"/>
  <text x="40" y="88" font-family="'Inter', sans-serif" font-size="12" fill="#6b7fa3" letter-spacing="2">AWS EVENT-DRIVEN ORDER PIPELINE</text>

  <!-- Stats bar -->
  <g transform="translate(40, 104)">
    <rect width="680" height="44" rx="8" fill="#111b30" stroke="#1e2d4a" stroke-width="1"/>
    <!-- Stat 1 -->
    <text x="24" y="16" font-family="monospace" font-size="18" font-weight="bold" fill="#ff9900" filter="url(#softglow)">84 req/s</text>
    <text x="24" y="32" font-family="sans-serif" font-size="10" fill="#6b7fa3">Throughput</text>
    <!-- Divider -->
    <line x1="140" y1="8" x2="140" y2="36" stroke="#1e2d4a" stroke-width="1"/>
    <!-- Stat 2 -->
    <text x="160" y="16" font-family="monospace" font-size="18" font-weight="bold" fill="#ff9900" filter="url(#softglow)">212ms</text>
    <text x="160" y="32" font-family="sans-serif" font-size="10" fill="#6b7fa3">p99 Latency</text>
    <!-- Divider -->
    <line x1="280" y1="8" x2="280" y2="36" stroke="#1e2d4a" stroke-width="1"/>
    <!-- Stat 3 -->
    <text x="300" y="16" font-family="monospace" font-size="18" font-weight="bold" fill="#4ade80" filter="url(#softglow)">0%</text>
    <text x="300" y="32" font-family="sans-serif" font-size="10" fill="#6b7fa3">Error Rate</text>
    <!-- Divider -->
    <line x1="390" y1="8" x2="390" y2="36" stroke="#1e2d4a" stroke-width="1"/>
    <!-- Stat 4 -->
    <text x="410" y="16" font-family="monospace" font-size="18" font-weight="bold" fill="#4a9eff" filter="url(#softglow)">112x</text>
    <text x="410" y="32" font-family="sans-serif" font-size="10" fill="#6b7fa3">Lambda Speedup</text>
    <!-- Divider -->
    <line x1="530" y1="8" x2="530" y2="36" stroke="#1e2d4a" stroke-width="1"/>
    <!-- Stat 5 -->
    <text x="550" y="16" font-family="monospace" font-size="18" font-weight="bold" fill="#c084fc" filter="url(#softglow)">&gt;0.7</text>
    <text x="550" y="32" font-family="sans-serif" font-size="10" fill="#6b7fa3">Fraud Threshold</text>
  </g>

  <!-- Architecture flow diagram -->
  <!-- Node helper: each service box is ~90x56 -->

  <!-- Row 1: API Gateway → SQS → EventBridge -->
  <!-- Node: API / Next.js -->
  <g transform="translate(40, 178)">
    <rect width="100" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="100" height="3" rx="1.5" fill="#4a9eff" opacity="0.8"/>
    <text x="50" y="24" font-family="monospace" font-size="10" fill="#7db4ff" text-anchor="middle">Next.js</text>
    <text x="50" y="38" font-family="monospace" font-size="9" fill="#4a6080" text-anchor="middle">Frontend</text>
  </g>

  <!-- Arrow → -->
  <line x1="142" y1="204" x2="168" y2="204" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Node: SQS -->
  <g transform="translate(170, 178)">
    <rect width="100" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="100" height="3" rx="1.5" fill="#ff9900" opacity="0.8"/>
    <text x="50" y="24" font-family="monospace" font-size="10" fill="#ffb84d" text-anchor="middle">SQS</text>
    <text x="50" y="38" font-family="monospace" font-size="9" fill="#4a6080" text-anchor="middle">Message Queue</text>
  </g>

  <!-- Arrow → -->
  <line x1="272" y1="204" x2="298" y2="204" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Node: EventBridge -->
  <g transform="translate(300, 178)">
    <rect width="100" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="100" height="3" rx="1.5" fill="#ff9900" opacity="0.8"/>
    <text x="50" y="24" font-family="monospace" font-size="10" fill="#ffb84d" text-anchor="middle">EventBridge</text>
    <text x="50" y="38" font-family="monospace" font-size="9" fill="#4a6080" text-anchor="middle">Event Router</text>
  </g>

  <!-- Arrow → -->
  <line x1="402" y1="204" x2="428" y2="204" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Node: Step Functions -->
  <g transform="translate(430, 178)">
    <rect width="110" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="110" height="3" rx="1.5" fill="#c084fc" opacity="0.8"/>
    <text x="55" y="24" font-family="monospace" font-size="10" fill="#d4a0ff" text-anchor="middle">Step Functions</text>
    <text x="55" y="38" font-family="monospace" font-size="9" fill="#4a6080" text-anchor="middle">Orchestration</text>
  </g>

  <!-- Arrow from Step Functions down to Lambda -->
  <line x1="485" y1="232" x2="485" y2="258" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Row 2 nodes -->
  <!-- Node: Lambda -->
  <g transform="translate(430, 260)">
    <rect width="110" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="110" height="3" rx="1.5" fill="#ff9900" opacity="0.8"/>
    <text x="55" y="24" font-family="monospace" font-size="10" fill="#ffb84d" text-anchor="middle">Lambda</text>
    <text x="55" y="38" font-family="monospace" font-size="9" fill="#4a6080" text-anchor="middle">Serverless Fn</text>
  </g>

  <!-- Arrow ← from Lambda to Bedrock -->
  <line x1="428" y1="286" x2="402" y2="286" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Node: Bedrock -->
  <g transform="translate(300, 260)">
    <rect width="100" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="100" height="3" rx="1.5" fill="#4a9eff" opacity="0.8"/>
    <text x="50" y="24" font-family="monospace" font-size="10" fill="#7db4ff" text-anchor="middle">Bedrock</text>
    <text x="50" y="38" font-family="monospace" font-size="9" fill="#4a6080" text-anchor="middle">Fraud AI (LLM)</text>
  </g>

  <!-- Arrow ← to DynamoDB -->
