    <rect width="100" height="52" rx="8" fill="url(#nodeGrad)" stroke="#2a3f6a" stroke-width="1.2"/>
    <rect width="100" height="3" rx="1.5" fill="#f87171" opacity="0.8"/>
    <text x="50" y="22" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">X-Ray &amp;</text>
    <text x="50" y="34" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">CloudWatch</text>
    <text x="50" y="46" font-family="monospace" font-size="8" fill="#4a6080" text-anchor="middle">Observability</text>
  </g>

  <!-- CDK + GitHub Actions badge row -->
  <g transform="translate(40, 336)">
    <rect width="104" height="26" rx="6" fill="#0f1a10" stroke="#4ade80" stroke-width="1"/>
    <text x="52" y="17" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">AWS CDK (IaC)</text>

    <rect x="116" width="128" height="26" rx="6" fill="#0f1a10" stroke="#4ade80" stroke-width="1"/>
    <text x="180" y="17" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">GitHub Actions CI/CD</text>

    <rect x="256" width="86" height="26" rx="6" fill="#0f1a10" stroke="#4ade80" stroke-width="1"/>
    <text x="299" y="17" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">TypeScript</text>

    <rect x="354" width="72" height="26" rx="6" fill="#0f1a10" stroke="#4ade80" stroke-width="1"/>
    <text x="390" y="17" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">Next.js</text>
  </g>

  <!-- Power Tuning note -->
  <g transform="translate(40, 382)">
    <rect width="540" height="48" rx="8" fill="#0d1a10" stroke="#1e3a1e" stroke-width="1"/>
    <text x="16" y="18" font-family="monospace" font-size="11" fill="#6b7fa3">// AWS Power Tuning → 112x Lambda speedup</text>
    <text x="16" y="34" font-family="monospace" font-size="11">
      <tspan fill="#c084fc">const</tspan>
      <tspan fill="#e0e0e0"> fraudScore = </tspan>
      <tspan fill="#4a9eff">await</tspan>
      <tspan fill="#e0e0e0"> bedrock.</tspan>
      <tspan fill="#ffb84d">invoke</tspan>
      <tspan fill="#e0e0e0">(order);</tspan>
    </text>
    <text x="16" y="48" font-family="monospace" font-size="11">
      <tspan fill="#c084fc">if</tspan>
      <tspan fill="#e0e0e0"> (fraudScore </tspan>
      <tspan fill="#f87171">&gt; 0.7</tspan>
      <tspan fill="#e0e0e0">) stepFunctions.</tspan>
      <tspan fill="#ffb84d">flag</tspan>
      <tspan fill="#e0e0e0">(order);</tspan>
    </text>
  </g>

  <!-- Right side decorative element: live badge -->
  <g transform="translate(620, 30)">
    <rect width="140" height="32" rx="16" fill="#0d1a10" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="5" fill="#4ade80" filter="url(#softglow)"/>
    <text x="30" y="21" font-family="sans-serif" font-size="12" font-weight="600" fill="#4ade80">LIVE</text>
    <text x="65" y="21" font-family="sans-serif" font-size="11" fill="#6b9e6b">netlify.app</text>
  </g>
</svg>
