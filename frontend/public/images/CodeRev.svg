<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#f0f2f5"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#9f67fa"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowStrong">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="800" height="4" fill="url(#purpleGrad)"/>

  <!-- Header -->
  <text x="40" y="52" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="36" font-weight="800" fill="#1a1a2e">CodeRev</text>
  <rect x="40" y="58" width="160" height="3" rx="1.5" fill="url(#purpleGrad)"/>
  <text x="40" y="78" font-family="sans-serif" font-size="12" fill="#6b7280" letter-spacing="1">VS CODE EXTENSION  ·  AI CODE REVIEW  ·  RAG</text>

